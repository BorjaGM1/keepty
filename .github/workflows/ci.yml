name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

      - name: Build release
        run: cargo build --release --locked -p keepty

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build keepty binary
        run: cargo build --release --locked -p keepty

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK + test deps
        run: pip install -e sdks/python pytest

      - name: Run tests
        run: pytest sdks/python/tests -q

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build keepty binary
        run: cargo build --release --locked -p keepty

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build SDK
        working-directory: sdks/typescript
        run: npm ci && npm run build

      - name: Run tests
        working-directory: sdks/typescript
        run: npm test

  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        working-directory: sdks/go
        run: go test ./...

  dotnet-sdk:
    name: .NET SDK (build only)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Build
        run: dotnet build sdks/dotnet/Keepty/Keepty.csproj -c Release
