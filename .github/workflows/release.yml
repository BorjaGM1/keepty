name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked -p keepty --target aarch64-apple-darwin

      - name: Strip binary
        run: strip -x target/aarch64-apple-darwin/release/keepty

      - name: Package
        run: tar -C target/aarch64-apple-darwin/release -czf keepty-aarch64-apple-darwin.tar.gz keepty

      - uses: actions/upload-artifact@v4
        with:
          name: keepty-aarch64-apple-darwin
          path: keepty-aarch64-apple-darwin.tar.gz
          if-no-files-found: error

  build-linux-x86_64-musl:
    name: Build Linux x64 musl
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CC_x86_64_unknown_linux_musl: musl-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked -p keepty --target x86_64-unknown-linux-musl

      - name: Strip binary
        run: strip --strip-unneeded target/x86_64-unknown-linux-musl/release/keepty

      - name: Package
        run: tar -C target/x86_64-unknown-linux-musl/release -czf keepty-x86_64-unknown-linux-musl.tar.gz keepty

      - uses: actions/upload-artifact@v4
        with:
          name: keepty-x86_64-unknown-linux-musl
          path: keepty-x86_64-unknown-linux-musl.tar.gz
          if-no-files-found: error

  build-linux-arm64-musl:
    name: Build Linux arm64 musl
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CC_aarch64_unknown_linux_musl: musl-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked -p keepty --target aarch64-unknown-linux-musl

      - name: Strip binary
        run: strip --strip-unneeded target/aarch64-unknown-linux-musl/release/keepty

      - name: Package
        run: tar -C target/aarch64-unknown-linux-musl/release -czf keepty-aarch64-unknown-linux-musl.tar.gz keepty

      - uses: actions/upload-artifact@v4
        with:
          name: keepty-aarch64-unknown-linux-musl
          path: keepty-aarch64-unknown-linux-musl.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-macos-arm64
      - build-linux-x86_64-musl
      - build-linux-arm64-musl
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f -name 'keepty-*.tar.gz' -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum keepty-*.tar.gz > checksums.txt

      - name: Generate release notes
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          previous_tag="$(git tag --merged "$current_tag" --list 'v*' --sort=-version:refname | grep -Fxv "$current_tag" | head -n 1 || true)"

          {
            echo "# ${current_tag}"
            echo
            if [ -n "$previous_tag" ]; then
              echo "Changes since ${previous_tag}:"
              echo
              git log \
                --reverse \
                --first-parent \
                --no-merges \
                --pretty="- %s ([%h](${repo_url}/commit/%H))" \
                "${previous_tag}..${current_tag}"
              echo
              echo "Full Changelog: ${repo_url}/compare/${previous_tag}...${current_tag}"
            else
              echo "Changes in this release:"
              echo
              git log \
                --reverse \
                --first-parent \
                --no-merges \
                --pretty="- %s ([%h](${repo_url}/commit/%H))" \
                "${current_tag}"
            fi
          } > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          assets=(
            release-assets/keepty-aarch64-apple-darwin.tar.gz
            release-assets/keepty-x86_64-unknown-linux-musl.tar.gz
            release-assets/keepty-aarch64-unknown-linux-musl.tar.gz
            release-assets/checksums.txt
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" "${assets[@]}" \
              --verify-tag \
              --title "$tag" \
              --notes-file release-notes.md
          fi
